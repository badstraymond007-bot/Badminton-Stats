<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badminton Stats</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Badminton Stats</h1>
    <p>Club de badminton</p>
  </header>

  <main>
    <section class="card">
      <div class="tabs">
        <button class="tab active" data-tab="joueurs">Joueurs</button>
        <button class="tab" data-tab="journees">Journées de match</button>
        <button class="tab" data-tab="classement">Classement global</button>
      </div>

      <div class="tab-content active" id="joueurs">
        <ul>
          <li>Joueur 1</li>
          <li>Joueur 2</li>
          <li>Joueur 3</li>
        </ul>
      </div>

      <div class="tab-content" id="journees">
        <p>Aucune journée enregistrée pour le moment.</p>
      </div>

      <div class="tab-content" id="classement">
        <p>Le classement global apparaîtra ici.</p>
      </div>
    </section>
  </main>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const contents = document.querySelectorAll(".tab-content");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;

        tabs.forEach(t => t.classList.remove("active"));
        contents.forEach(c => c.classList.remove("active"));

        tab.classList.add("active");
        document.getElementById(target).classList.add("active");
      });
    });
  </script>
</body>
</html>
