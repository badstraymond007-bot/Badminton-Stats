<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journée de matchs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Journée de matchs</h1>
    <p id="date-label">Date</p>
  </header>

  <main>
    <section class="card">
      <div class="tabs">
        <button class="tab active" data-tab="presences">Présences</button>
        <button class="tab" data-tab="matchs">Matchs de la journée</button>
      </div>

      <div class="tab-content active" id="presences">
        <h2>Présences des joueurs</h2>

        <ul class="player-list presence-list">
          <li><label class="presence-row"><input type="checkbox" /><span>Sébastien Moisan</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>David Fortier</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Cédric Borgia</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Louis Noreau</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Dominic Beaupré</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Pier-Luc Morency</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Étienne Drolet</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Richard Genois</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Mario Bessette</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Yvan Renaud</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Gaétan Borgia</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Sébastien Plamondon</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Julien Auger</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Rémi Ouellet</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Dominic Laroche</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Dave Marcoux</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Mathieu Bayard</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Steven Moisan</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Olivier Paquet</span></label></li>
          <li><label class="presence-row"><input type="checkbox" /><span>Frédéric Boucher</span></label></li>
        </ul>

        <p class="note-helper">Pour plus tard : case cochée = absent.</p>
      </div>

      <div class="tab-content" id="matchs">
        <h2>Matchs de la journée</h2>
        <p>Le calendrier des matchs de cette journée sera ajouté ici.</p>
      </div>

      <p style="margin-top: 24px;">
        <a class="action-btn back-link" href="index.html">Retour aux journées</a>
      </p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const date = params.get("date");
    const label = document.getElementById("date-label");

    if (date) {
      const options = { weekday: "long", year: "numeric", month: "long", day: "numeric" };
      const formattedDate = new Date(date + "T12:00:00").toLocaleDateString("fr-CA", options);
      label.textContent = formattedDate.charAt(0).toUpperCase() + formattedDate.slice(1);
    } else {
      label.textContent = "Aucune date sélectionnée";
    }

    const tabs = document.querySelectorAll(".tab");
    const contents = document.querySelectorAll(".tab-content");

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;

        tabs.forEach((t) => t.classList.remove("active"));
        contents.forEach((c) => c.classList.remove("active"));

        tab.classList.add("active");
        document.getElementById(target).classList.add("active");
      });
    });
  </script>
</body>
</html>
